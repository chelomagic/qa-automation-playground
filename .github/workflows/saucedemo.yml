name: SauceDemo Playwright Tests

on:
  push:
    paths:
      - 'saucedemo-playwright/**'
      - '.github/workflows/saucedemo.yml'
  pull_request:
    paths:
      - 'saucedemo-playwright/**'
      - '.github/workflows/saucedemo.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: saucedemo-playwright

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: saucedemo-playwright/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saucedemo-playwright-report
          path: saucedemo-playwright/playwright-report/